<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrbitControl</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Left panel -->
  <nav class="panel">
    <div class="panel-header">
      <h1><span>Orbit</span>Control</h1>
    </div>

    <div class="panel-section">
      <div class="panel-label">Kiosk URL</div>
      <div class="url-row">
        <input type="url" id="url-input" placeholder="https://example.com" spellcheck="false">
        <button class="btn btn-primary" id="btn-navigate">Go</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Page Zoom</div>
      <div class="zoom-row">
        <input type="range" id="zoom-slider" min="25" max="300" value="100" step="5">
        <span class="zoom-value" id="zoom-value">100%</span>
        <button class="btn btn-small" id="btn-zoom-reset">Reset</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Network</div>
      <div class="net-row">
        <div class="net-current" id="net-current">
          <span class="net-dot" id="net-dot"></span>
          <span id="net-ssid">—</span>
        </div>
        <button class="btn btn-small" id="btn-net-manage">Manage</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Display Resolution</div>
      <div class="display-row">
        <select id="display-preset">
          <option value="1920x1080">1920 × 1080 (1080p)</option>
          <option value="1280x720">1280 × 720 (720p)</option>
          <option value="1024x768">1024 × 768</option>
          <option value="960x640">960 × 640</option>
          <option value="800x600">800 × 600</option>
          <option value="custom">Custom...</option>
        </select>
        <button class="btn btn-small" id="btn-display-apply">Apply</button>
      </div>
      <div class="display-custom" id="display-custom" hidden>
        <input type="number" id="display-w" placeholder="W" min="320" max="7680">
        <span class="display-x">×</span>
        <input type="number" id="display-h" placeholder="H" min="240" max="4320">
      </div>
      <div class="display-hint" id="display-hint">Applies on kiosk restart.</div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Actions</div>
      <div class="actions">
        <button class="btn" id="btn-reload">&#x21bb; Reload page</button>
        <button class="btn" id="btn-restart">&#x27f3; Restart kiosk</button>
        <button class="btn" id="btn-update">&#x2913; Update from Git</button>
        <button class="btn btn-danger" id="btn-reboot">&#x23fb; Reboot system</button>
      </div>
    </div>

    <div class="panel-section panel-bottom">
      <div class="panel-label">System Info</div>
      <table class="sys-table" id="sys-info">
        <tr><td>Loading...</td><td></td></tr>
      </table>
    </div>
  </nav>

  <!-- Centered preview -->
  <main class="stage">
    <div class="preview-monitor">
      <img class="monitor-frame" src="/img/preview.png" alt="" draggable="false">
      <img id="preview-img" class="preview-screen" alt="Kiosk preview">
      <div class="preview-placeholder" id="preview-placeholder"><div class="spinner"></div></div>
      <div class="preview-led active" id="preview-led" title="Toggle preview"></div>
      <div class="status-badge" id="status-badge">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Browser offline</span>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <div class="update-modal" id="wifi-modal" hidden>
    <div class="update-modal-inner">
      <div class="update-modal-header">
        <h2>WiFi Networks</h2>
        <button class="btn btn-small" id="btn-wifi-close">Close</button>
      </div>
      <div class="wifi-current-box" id="wifi-current-box">
        <span class="net-dot" id="wifi-modal-dot"></span>
        <span id="wifi-modal-ssid">—</span>
      </div>
      <div class="wifi-actions-row">
        <button class="btn btn-small" id="btn-wifi-scan">↻ Scan</button>
        <span class="wifi-hint" id="wifi-hint"></span>
      </div>
      <div class="wifi-list" id="wifi-list">
        <div class="wifi-empty">Click Scan to look for networks.</div>
      </div>
      <div class="wifi-saved-label">Saved</div>
      <div class="wifi-saved" id="wifi-saved"></div>
    </div>
  </div>

  <div class="update-modal" id="wifi-connect-modal" hidden>
    <div class="update-modal-inner update-modal-small">
      <div class="update-modal-header">
        <h2 id="wifi-connect-title">Connect</h2>
        <button class="btn btn-small" id="btn-wifi-connect-cancel">Cancel</button>
      </div>
      <div class="wifi-connect-body">
        <label class="wifi-pw-label">
          <span>Password (leave empty for open network)</span>
          <input type="password" id="wifi-password" autocomplete="off" spellcheck="false">
        </label>
        <button class="btn btn-primary" id="btn-wifi-connect-submit">Connect</button>
        <div class="wifi-connect-msg" id="wifi-connect-msg"></div>
      </div>
    </div>
  </div>

  <div class="update-modal" id="update-modal" hidden>
    <div class="update-modal-inner">
      <div class="update-modal-header">
        <h2 id="update-title">Updating...</h2>
        <button class="btn btn-small" id="btn-update-close" hidden>Close</button>
      </div>
      <div class="update-step" id="update-step-text">Preparing...</div>
      <pre class="update-output" id="update-output"></pre>
      <div class="update-status-row" id="update-status-row">
        <div class="spinner spinner-inline"></div>
        <span id="update-substatus">Connecting...</span>
      </div>
    </div>
  </div>

  <script src="/js/control.js"></script>
</body>
</html>
